<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>
<style>
    :root{
        --bg1:#0f172a;
        --bg2:#0ea5a9;
        --text:#f8fafc;
        --accent:#ffd166;
    }
    body{
        margin:0;
        padding:2rem;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:.5rem;
        background:linear-gradient(135deg,var(--bg1),var(--bg2));
        color:var(--text);
        font-family:Inter, "Segoe UI", Roboto, system-ui, -apple-system, "Helvetica Neue", Arial;
        -webkit-font-smoothing:antialiased;
        text-rendering:optimizeLegibility;
        text-align:center;
    }
    h1{font-size:clamp(1.6rem,4vw,2.4rem);margin:.2rem 0;}
    h3{font-size:clamp(1rem,2.6vw,1.25rem);margin:.1rem 0;opacity:.95;}
    h5{font-size:clamp(.85rem,2vw,1rem);margin:.1rem 0;color:var(--accent);}
    @media (max-width:480px){
        body{padding:1rem;}
    }
    </style>
</head>
<body>
    <h1> Welcome to my coding course!!! </h1>
    <h3> We configuring amazon S3 and CodePipelines!!! </h3>
    <h5> Hello, World - Who is the best hacker in the world!!! </h5>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>
<style>
    :root{
        --bg1:#0f172a;
        --bg2:#0ea5a9;
        --text:#f8fafc;
        --accent:#ffd166;
    }
    body{
        margin:0;
        padding:2rem;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:.5rem;
        background:linear-gradient(135deg,var(--bg1),var(--bg2));
        color:var(--text);
        font-family:Inter, "Segoe UI", Roboto, system-ui, -apple-system, "Helvetica Neue", Arial;
        -webkit-font-smoothing:antialiased;
        text-rendering:optimizeLegibility;
        text-align:center;
    }
    h1{font-size:clamp(1.6rem,4vw,2.4rem);margin:.2rem 0;}
    h3{font-size:clamp(1rem,2.6vw,1.25rem);margin:.1rem 0;opacity:.95;}
    h5{font-size:clamp(.85rem,2vw,1rem);margin:.1rem 0;color:var(--accent);}
    @media (max-width:480px){
        body{padding:1rem;}
    }
    </style>
</head>
<body>
    <h1> Welcome to my coding course!!! </h1>
    <h3> We configuring amazon S3 and CodePipelines!!! </h3>
    <h5> Hello, World - Who is the best hacker in the world!!! </h5>
    <div class="aws-diagram" style="max-width:900px;width:100%;margin-top:1rem;"></div>
        <svg viewBox="0 0 900 200" width="100%" height="200" aria-label="AWS integration diagram: GitHub to CodePipeline to Amazon S3" role="img">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 z" fill="#ffd166"/>
                </marker>
                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
                </filter>
                <linearGradient id="grad-gh" x1="0" x2="1">
                    <stop offset="0" stop-color="#24292e"/>
                    <stop offset="1" stop-color="#444"/>
                </linearGradient>
                <linearGradient id="grad-cp" x1="0" x2="1">
                    <stop offset="0" stop-color="#0ea5a9"/>
                    <stop offset="1" stop-color="#06b6d4"/>
                </linearGradient>
                <linearGradient id="grad-s3" x1="0" x2="1">
                    <stop offset="0" stop-color="#ffd166"/>
                    <stop offset="1" stop-color="#ffb703"/>
                </linearGradient>
            </defs>

            <!-- GitHub node -->
            <g transform="translate(40,20)" filter="url(#shadow)">
                <rect x="0" y="0" rx="14" ry="14" width="220" height="160" fill="url(#grad-gh)"/>
                <circle cx="50" cy="80" r="34" fill="#ffffff" opacity="0.9"/>
                <text x="50" y="88" text-anchor="middle" font-family="Inter, Arial" font-size="20" fill="#24292e" font-weight="700">GH</text>
                <text x="120" y="60" font-family="Inter, Arial" font-size="18" fill="#fff" font-weight="700">GitHub</text>
                <text x="120" y="88" font-family="Inter, Arial" font-size="13" fill="#e6eef6">Source repository</text>
                <text x="120" y="112" font-family="Inter, Arial" font-size="12" fill="#c7d2fe">Branches, commits, webhooks</text>
            </g>

            <!-- Arrow GH -> CP -->
            <line x1="260" y1="100" x2="380" y2="100" stroke="#ffd166" stroke-width="4" marker-end="url(#arrow)" />

            <!-- CodePipeline node -->
            <g transform="translate(420,20)" filter="url(#shadow)">
                <rect x="0" y="0" rx="14" ry="14" width="260" height="160" fill="url(#grad-cp)"/>
                <g transform="translate(36,40)">
                    <rect x="0" y="0" rx="8" ry="8" width="64" height="64" fill="#072f2f"/>
                    <path d="M16 22 h32 v4 h-32 z" fill="#06f6f6"/>
                    <path d="M16 30 h32 v4 h-32 z" fill="#06f6f6"/>
                </g>
                <text x="160" y="60" font-family="Inter, Arial" font-size="18" fill="#fff" font-weight="700" text-anchor="middle">CodePipeline</text>
                <text x="160" y="88" font-family="Inter, Arial" font-size="13" fill="#e6fdfd" text-anchor="middle">Build → Test → Deploy</text>
                <text x="160" y="112" font-family="Inter, Arial" font-size="12" fill="#bff0ef" text-anchor="middle">Integrates source, build & deploy actions</text>
            </g>

            <!-- Arrow CP -> S3 -->
            <line x1="700" y1="100" x2="820" y2="100" stroke="#ffd166" stroke-width="4" marker-end="url(#arrow)" />

            <!-- S3 node -->
            <g transform="translate(840,20)" filter="url(#shadow)">
                <!-- invisible container for alignment (no width overflow) -->
            </g>

            <!-- S3 placed a bit right using a separate group (to keep viewBox simple) -->
            <g transform="translate(740,20)" filter="url(#shadow)">
                <rect x="0" y="0" rx="14" ry="14" width="200" height="160" fill="url(#grad-s3)"/>
                <path d="M30 60 h140 v20 c0 22 -28 38 -70 38 s-70 -16 -70 -38 z" fill="#fff" opacity="0.92"/>
                <text x="100" y="92" font-family="Inter, Arial" font-size="18" fill="#6b3b00" font-weight="700" text-anchor="middle">S3</text>
                <text x="100" y="116" font-family="Inter, Arial" font-size="12" fill="#4b2b00" text-anchor="middle">Object storage for static assets</text>
                <text x="100" y="136" font-family="Inter, Arial" font-size="12" fill="#4b2b00" text-anchor="middle">(website hosting, artifacts)</text>
            </g>

            <!-- Legend / flow label -->
            <text x="450" y="190" font-family="Inter, Arial" font-size="12" fill="#e6eef6" text-anchor="middle">Flow: GitHub → CodePipeline → Amazon S3</text>
        </svg>

        <p style="margin:.5rem 0 0;font-size:.9rem;color:var(--text);opacity:.9;">
            Typical flow: commit to GitHub triggers CodePipeline (build/test), which deploys artifacts to S3 (static hosting or artifact storage).
        </p>
    </div>
</body>
</html>
